    const NotesUI = ({ setActiveTab }) => {

                      {subject.status}

                  </div>
                  <ProgressBar progress={subject.progress} color={isActive ? 'cyan' : subject.color} />

          </div>

          {/* Main Content Area: Left Panel (Topics) + Right Panel (Notes Viewer) */}

                  <h2 className="text-2xl font-bold text-white">ER Model and Diagrams</h2>

                <div className="flex gap-2">
                  <button className="p-2 bg-slate-800 hover:bg-slate-700 border border-slate-700/50 hover:border-slate-600 rounded-lg text-slate-300 transition-all tooltip" title="Bookmark">
                    🔖

                  <button className="p-2 bg-slate-800 hover:bg-slate-700 border border-slate-700/50 hover:border-slate-600 rounded-lg text-slate-300 transition-all tooltip" title="Download PDF">
                    📥
                  </button>
                </div>
              </div>

              <div className="flex-1 p-8 overflow-y-auto text-slate-300 leading-relaxed space-y-6">
                <p className="text-lg text-slate-200 font-medium">
                  The Entity-Relationship (ER) model is a high-level conceptual data model useful in developing a conceptual design for databases.
                </p>

                <div className="bg-slate-950/50 border border-slate-800 p-5 rounded-xl my-6">
                  <h4 className="text-white font-semibold mb-3 flex items-center gap-2">
                    <span className="text-emerald-400">💡</span> Key Concepts
                  </h4>
                  <ul className="list-disc pl-5 space-y-2 text-sm text-slate-400">
                    <li><strong className="text-slate-300">Entity:</strong> An object in the real world that is distinguishable from other objects.</li>
                    <li><strong className="text-slate-300">Attribute:</strong> Properties that describe an entity.</li>
                    <li><strong className="text-slate-300">Relationship:</strong> An association among several entities.</li>
                  </ul>
                </div>

                  <strong>Entity Sets:</strong> A collection of entities of the same type that share the same properties or attributes. For example, a set of all persons who are customers at a given bank can be defined as the customer entity set.
                </p>

                <div className="w-full h-48 bg-slate-800/50 border border-slate-700 rounded-xl flex items-center justify-center text-slate-500 my-6 border-dashed hover:border-slate-500 transition-colors cursor-pointer">
                  [ER Diagram Illustration Placeholder]
                </div>

                <p>
                  <strong>Mapping Cardinalities:</strong> Express the number of entities to which another entity can be associated via a relationship set. They are most useful in describing binary relationship sets.
                </p>
              </div>

    // --- From ai-chat.html ---
    const chatHistory = [

      { id: 2, title: 'Dijkstra Algorithm Help', date: 'Yesterday' },
      { id: 3, title: 'React Hooks vs Classes', date: '2 days ago' },
      { id: 4, title: 'Normalization Normal Forms', date: 'Last week' },
    ];

    const initialMessages = [
      { id: 1, sender: 'ai', text: 'Hello! I am your AI learning assistant. What would you like to study today?' }
    ];

    const modes = ['Simple', 'Exam', 'Step-by-step'];

    const ChatUI = ({ setActiveTab }) => {
      const [messages, setMessages] = useState(initialMessages);
      const [inputValue, setInputValue] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [selectedMode, setSelectedMode] = useState('Step-by-step');
      const messagesEndRef = useRef(null);

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages, isTyping]);

      const handleSend = () => {
        if (!inputValue.trim()) return;

        const newMsg = { id: Date.now(), sender: 'user', text: inputValue };
        setMessages(prev => [...prev, newMsg]);
        setInputValue('');
        setIsTyping(true);

        setTimeout(() => {
          setIsTyping(false);
          setMessages(prev => [
            ...prev,
            { id: Date.now(), sender: 'ai', text: `Here is a ${selectedMode.toLowerCase()} explanation for what you asked. This represents a generated response to help you understand the concept better...` }
          ]);
        }, 2000);
      };

      return (
        <div className="max-w-7xl mx-auto flex h-[90vh] gap-6">

                  <p className="text-xs text-slate-500 mt-1">{chat.date}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Right Area: Chat Window */}
